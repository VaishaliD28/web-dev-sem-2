<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('./image/bg.webp') no-repeat center center/cover;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            margin-top: 120px; /* thoda niche push for layout */
        }

        .dashboard-grid {
            display: flex;
            gap: 25px;
            justify-content: center;
        }

        h1 {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: black;
            font-weight: bold;
            text-align: center;
        }

        #greet {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: black;
            font-weight: bold;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            color: black;
        }

        .search-wrapper {
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 30px;
            border: 2px solid #B8D8E8;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #FF8552;
        }

        button {
            padding: 12px 28px;
            background: #FF8552;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover {
            background: #e66a35;
            transform: scale(1.02);
        }

        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            border-left: 5px solid #FF8552;
            margin-bottom: 10px;
            background: #f4f9fc;
            border-radius: 0 10px 10px 0;
        }

        .history-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .history-btn {
            padding: 8px 18px;
            border-radius: 25px;
            background: #E1F0FA;
            color: #0B2F4E;
            border: 1px solid #9BC4D9;
            cursor: pointer;
            transition: 0.15s;
        }

        .history-btn:hover {
            background: #FF8552;
            color: white;
            border-color: #FF8552;
        }

        @media (max-width:700px) {
            .dashboard-grid {
                flex-direction: column;
            }
        }
    </style>
</head>

<body id="body">

    <h1>⛅ Weather Dashboard Pro</h1>
    <h2 id="greet"></h2>

    <div class="container">

        <div class="dashboard-grid">
            <div class="glass-card">
                <h3>🔍 City Search</h3>
                <div class="search-wrapper">
                    <input id="cityInput" placeholder="Enter city name...">
                    <button id="searchBtn">Get Weather</button>
                </div>
                <br>
                <h3>📋 Recent Searches</h3>
                <div class="history-panel" id="history"></div>
                <button class="extra-btn" onclick="clearHistory()">Clear All</button>
            </div>

            <div class="glass-card">
                <h3>🌡️ Current Weather</h3>
                <div id="weather"></div>
            </div>
        </div>

    </div>

    <script>
        const API_KEY = "5de65de81c868557011361edcfa219ba";
        
        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");
        
        let searchHistory = JSON.parse(localStorage.getItem('weatherSearches')) || [];

        async function getWeather(city) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("City not found. Please check the name.");
                throw new Error("City not found");
            }
            return await res.json();
        }

        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) search(city);
        };

        function renderWeather(d) {
            weatherBox.innerHTML = `
                <div class="weather-item"><label>📍 City</label><span>${d.name}, ${d.sys.country}</span></div>
                <div class="weather-item"><label>🌡️ Temperature</label><span>${d.main.temp} °C</span></div>
                <div class="weather-item"><label>☁️ Condition</label><span>${d.weather[0].main}</span></div>
                <div class="weather-item"><label>💧 Humidity</label><span>${d.main.humidity}%</span></div>
                <div class="weather-item"><label>💨 Wind</label><span>${d.wind.speed} m/s</span></div>
            `;
        }

        function saveHistory(city) {
            if (!searchHistory.includes(city)) {
                searchHistory.unshift(city);
                if (searchHistory.length > 6) searchHistory.pop();
                localStorage.setItem('weatherSearches', JSON.stringify(searchHistory));
            }
            showHistory();
        }

        function showHistory() {
            if (searchHistory.length === 0) {
                historyBox.innerHTML = '<p style="color:#666;">No searches yet</p>';
                return;
            }
            
            historyBox.innerHTML = searchHistory
                .map(city => `<button class="history-btn" onclick="search('${city}')">${city}</button>`)
                .join('');
        }

        function clearHistory() {
            localStorage.removeItem("weatherSearches");
            searchHistory = [];
            showHistory();
        }

        async function search(city) {
            weatherBox.innerHTML = '<p style="color:#666;">Loading...</p>';
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name);
                cityInput.value = '';
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:#d9534f;">❌ ${error.message}</p>`;
            }
        }

        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) search(city);
            }
        });

        showHistory();

        function setDayNightMode() {
            const hour = new Date().getHours();
            const greet = document.getElementById("greet");

            if (hour >= 6 && hour < 18) {
                greet.innerText = "Good Day ☀️";
            } else {
                greet.innerText = "Good Night 🌙";
            }
        }

        setDayNightMode();
        setInterval(setDayNightMode, 600);
    </script>

</body>
</html>
